name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Verify Code Formatting
        run: go fmt ./... && git diff --exit-code

      - name: Run Tests
        run: go test -v ./...

      - name: Build Binary (linux/amd64)
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o devcontainer-linux-amd64 ./cmd/devcontainer/main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: devcontainer-linux-amd64
          path: devcontainer-linux-amd64
          if-no-files-found: error
