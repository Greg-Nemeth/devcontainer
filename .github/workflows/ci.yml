name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Verify Code Formatting
        run: go fmt ./... && git diff --exit-code

      - name: Run Tests
        run: go test -v ./...

      - name: Build Binaries (linux/amd64 & linux/arm64)
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o devcontainer-linux-amd64 ./cmd/devcontainer/main.go
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o devcontainer-linux-arm64 ./cmd/devcontainer/main.go

      - name: Upload Artifact (linux/amd64)
        uses: actions/upload-artifact@v4
        with:
          name: devcontainer-linux-amd64
          path: devcontainer-linux-amd64
          if-no-files-found: error

      - name: Upload Artifact (linux/arm64)
        uses: actions/upload-artifact@v4
        with:
          name: devcontainer-linux-arm64
          path: devcontainer-linux-arm64
          if-no-files-found: error

  release:
    name: Create Release
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifact (linux/amd64)
        uses: actions/download-artifact@v4
        with:
          name: devcontainer-linux-amd64
          path: .

      - name: Download Artifact (linux/arm64)
        uses: actions/download-artifact@v4
        with:
          name: devcontainer-linux-arm64
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            devcontainer-linux-amd64
            devcontainer-linux-arm64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
